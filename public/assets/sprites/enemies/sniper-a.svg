<svg width="16" height="16" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#0000"/>
  <!-- 身体核心：深红框 -->
  <rect x="4" y="5" width="7" height="6" fill="#3a0810"/>
  <!-- 装甲外壳 -->
  <rect x="5" y="4" width="5" height="7" fill="#6b1020"/>
  <!-- 顶部尖刺 -->
  <rect x="7" y="2" width="2" height="3" fill="#8b1828"/>
  <!-- 眼睛（瞄准光点） -->
  <rect x="7" y="6" width="3" height="1" fill="#ff2040"/>
  <rect x="9" y="5" width="1" height="3" fill="#ff2040"/>
  <!-- 枪管（向右突出） -->
  <rect x="10" y="7" width="5" height="1" fill="#c03040"/>
  <rect x="13" y="6" width="2" height="3" fill="#801828"/>
  <!-- 能量纹路 -->
  <rect x="5" y="8" width="4" height="1" fill="#ff6070"/>
  <!-- 底部支架 -->
  <rect x="4" y="11" width="2" height="2" fill="#3a0810"/>
  <rect x="9" y="11" width="2" height="2" fill="#3a0810"/>
</svg>
