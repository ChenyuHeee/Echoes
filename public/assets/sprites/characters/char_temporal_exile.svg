<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- 时之放逐者：暗金机甲 + 烈焰披风 -->
  <!-- 头盔 -->
  <rect x="4" y="1" width="8" height="6" fill="#1a1208"/>
  <rect x="4" y="1" width="8" height="1" fill="#604020"/>
  <!-- 头盔遮罩 -->
  <rect x="5" y="3" width="6" height="2" fill="#000000"/>
  <!-- 视镜（橙色烈光） -->
  <rect x="5" y="3" width="6" height="1" fill="#ffaa20"/>
  <rect x="6" y="3" width="1" height="1" fill="#ffffff"/>
  <rect x="9" y="3" width="1" height="1" fill="#ffffff"/>
  <!-- 头盔角 -->
  <rect x="3" y="2" width="1" height="2" fill="#a06020"/>
  <rect x="12" y="2" width="1" height="2" fill="#a06020"/>
  <!-- 肩甲 -->
  <rect x="2" y="7" width="3" height="3" fill="#604020"/>
  <rect x="11" y="7" width="3" height="3" fill="#604020"/>
  <!-- 胸甲 -->
  <rect x="5" y="7" width="6" height="6" fill="#2a1a0a"/>
  <rect x="5" y="7" width="6" height="1" fill="#604020"/>
  <!-- 烈焰核心 -->
  <rect x="7" y="9" width="2" height="2" fill="#ff8000"/>
  <rect x="7" y="9" width="1" height="1" fill="#ffe040"/>
  <!-- 披风（背后） -->
  <rect x="3" y="10" width="1" height="6" fill="#a02000"/>
  <rect x="12" y="10" width="1" height="6" fill="#a02000"/>
  <!-- 腿 -->
  <rect x="5" y="13" width="2" height="3" fill="#1a1208"/>
  <rect x="9" y="13" width="2" height="3" fill="#1a1208"/>
</svg>
