<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- 锈蚀刀片 — 对角线长剑 -->
  <!-- 剑身 (银灰) -->
  <rect x="12" y="1" width="2" height="1" fill="#c0b8b0"/>
  <rect x="11" y="2" width="2" height="1" fill="#c0b8b0"/>
  <rect x="10" y="3" width="2" height="1" fill="#c0b8b0"/>
  <rect x="9"  y="4" width="2" height="1" fill="#c0b8b0"/>
  <rect x="8"  y="5" width="2" height="1" fill="#c0b8b0"/>
  <rect x="7"  y="6" width="2" height="1" fill="#b0a8a0"/>
  <!-- 锈蚀边缘 -->
  <rect x="14" y="1" width="1" height="1" fill="#7a3810"/>
  <rect x="13" y="2" width="1" height="1" fill="#8B4513"/>
  <rect x="12" y="3" width="1" height="1" fill="#8B4513"/>
  <rect x="11" y="4" width="1" height="1" fill="#8B4513"/>
  <rect x="10" y="5" width="1" height="1" fill="#7a3810"/>
  <rect x="9"  y="6" width="1" height="1" fill="#6a2800"/>
  <!-- 护手 (金色) -->
  <rect x="4"  y="7" width="9" height="2" fill="#c8a030"/>
  <rect x="4"  y="7" width="1" height="2" fill="#906010"/>
  <rect x="12" y="7" width="1" height="2" fill="#906010"/>
  <rect x="5"  y="7" width="7" height="1" fill="#d8b040"/>
  <!-- 手柄 (深棕) -->
  <rect x="7"  y="9" width="2" height="5" fill="#5a3018"/>
  <rect x="8"  y="9" width="1" height="5" fill="#3a1808"/>
  <!-- 护手底部包边 -->
  <rect x="6"  y="14" width="4" height="1" fill="#7a4828"/>
  <rect x="7"  y="15" width="2" height="1" fill="#5a2810"/>
</svg>
