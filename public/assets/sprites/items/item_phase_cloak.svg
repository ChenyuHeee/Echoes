<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- 相位斗篷 — 半透明蓝色 -->
  <!-- 兜帽 -->
  <rect x="6" y="2" width="4" height="2" fill="#205088"/>
  <rect x="5" y="3" width="6" height="1" fill="#306098"/>
  <!-- 肩部 -->
  <rect x="4" y="4" width="8" height="2" fill="#3070a8"/>
  <rect x="3" y="5" width="10" height="1" fill="#4080b8"/>
  <!-- 主体披风 -->
  <rect x="3" y="6" width="10" height="6" fill="#4080b8"/>
  <rect x="3" y="6" width="1" height="6" fill="#205088"/>
  <rect x="12" y="6" width="1" height="6" fill="#205088"/>
  <!-- 半透明叠加 -->
  <rect x="5" y="7" width="6" height="3" fill="#60a0d0"/>
  <rect x="5" y="7" width="2" height="1" fill="#80c0e0"/>
  <!-- 下摆 -->
  <rect x="3" y="12" width="2" height="1" fill="#205080"/>
  <rect x="6" y="12" width="2" height="2" fill="#205080"/>
  <rect x="9" y="12" width="2" height="1" fill="#205080"/>
  <rect x="11" y="12" width="2" height="1" fill="#205080"/>
  <!-- 相位粒子 -->
  <rect x="2" y="3" width="1" height="1" fill="#a0e0ff"/>
  <rect x="14" y="9" width="1" height="1" fill="#a0e0ff"/>
</svg>
