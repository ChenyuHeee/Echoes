<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- 纳米胶布 — 急救十字 -->
  <!-- 底板 (米色) -->
  <rect x="2"  y="2"  width="12" height="12" fill="#d8c8a0"/>
  <!-- 胶布纹理 -->
  <rect x="2"  y="4"  width="12" height="1" fill="#c8b890"/>
  <rect x="2"  y="7"  width="12" height="1" fill="#c8b890"/>
  <rect x="2"  y="10" width="12" height="1" fill="#c8b890"/>
  <rect x="4"  y="2"  width="1" height="12" fill="#c8b890"/>
  <rect x="7"  y="2"  width="1" height="12" fill="#c8b890"/>
  <rect x="10" y="2"  width="1" height="12" fill="#c8b890"/>
  <!-- 边框 -->
  <rect x="2"  y="2"  width="12" height="1"  fill="#b0a080"/>
  <rect x="2"  y="13" width="12" height="1"  fill="#b0a080"/>
  <rect x="2"  y="2"  width="1"  height="12" fill="#b0a080"/>
  <rect x="13" y="2"  width="1"  height="12" fill="#b0a080"/>
  <!-- 红十字 -->
  <rect x="5"  y="5"  width="6" height="6" fill="#d03030"/>
  <!-- 十字亮面 -->
  <rect x="5"  y="5"  width="6" height="2" fill="#e04040"/>
  <rect x="5"  y="5"  width="2" height="6" fill="#e04040"/>
  <!-- 十字中心 -->
  <rect x="6"  y="6"  width="4" height="4" fill="#cc2828"/>
  <!-- 十字亮点 -->
  <rect x="7"  y="7"  width="2" height="1" fill="#f05050"/>
</svg>
