  <rect x="5"  y="5"  width="6" height="1" fill="#f0c050"/>
  <rect x="5"  y="10" width="6" height="1" fill="#906010"/>
  <rect x="5"  y="5"  width="1" height="6" fill="#f0c050"/>
  <rect x="10" y="5"  width="1" height="6" fill="#906010"/>
  <!-- 十字齿轮纹 -->
  <rect x="7"  y="6"  width="2" height="4" fill="#604008"/>
  <rect x="6"  y="7"  width="4" height="2" fill="#604008"/>
