<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- 悖论引擎 — 金色齿轮 -->
  <!-- 齿 (8个) -->
  <rect x="6"  y="0"  width="4" height="2" fill="#c08020"/>
  <rect x="6"  y="14" width="4" height="2" fill="#c08020"/>
  <rect x="0"  y="6"  width="2" height="4" fill="#c08020"/>
  <rect x="14" y="6"  width="2" height="4" fill="#c08020"/>
  <rect x="2"  y="2"  width="2" height="2" fill="#c08020"/>
  <rect x="12" y="2"  width="2" height="2" fill="#c08020"/>
  <rect x="2"  y="12" width="2" height="2" fill="#c08020"/>
  <rect x="12" y="12" width="2" height="2" fill="#c08020"/>
  <!-- 齿轮外圆 -->
  <rect x="4"  y="1"  width="8" height="1" fill="#d09030"/>
  <rect x="2"  y="2"  width="2" height="1" fill="#d09030"/>
  <rect x="12" y="2"  width="2" height="1" fill="#d09030"/>
  <rect x="1"  y="4"  width="1" height="8" fill="#d09030"/>
  <rect x="14" y="4"  width="1" height="8" fill="#b07018"/>
  <rect x="2"  y="13" width="2" height="1" fill="#d09030"/>
  <rect x="12" y="13" width="2" height="1" fill="#b07018"/>
  <rect x="4"  y="14" width="8" height="1" fill="#b07018"/>
