  <rect x="2"  y="3"  width="6"  height="5"  fill="#d8a030"/>
  <rect x="3"  y="2"  width="5"  height="4"  fill="#e0b040"/>
  <!-- 中心孔 -->
  <rect x="5"  y="5"  width="6" height="6" fill="#1a1000"/>
  <rect x="6"  y="4"  width="4" height="8" fill="#1a1000"/>
