<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- 时序电池 — 立式金属电池 + 沙金能量 -->
  <!-- 顶端正极 -->
  <rect x="7" y="1" width="2" height="2" fill="#a0a0a8"/>
  <rect x="7" y="1" width="1" height="1" fill="#d0d0d8"/>
  <!-- 顶盖 -->
  <rect x="5" y="3" width="6" height="1" fill="#606068"/>
  <!-- 主体外壳 -->
  <rect x="4" y="4" width="8" height="9" fill="#3a3a48"/>
  <rect x="4" y="4" width="1" height="9" fill="#5a5a68"/>
  <rect x="11" y="4" width="1" height="9" fill="#202028"/>
  <!-- 透明窗格 — 能量条 -->
  <rect x="6" y="6" width="4" height="5" fill="#1a1828"/>
  <rect x="6" y="7" width="4" height="4" fill="#c8a850"/>
  <rect x="6" y="7" width="4" height="1" fill="#f0d870"/>
  <rect x="6" y="9" width="4" height="1" fill="#806020"/>
  <!-- 标签 -->
  <rect x="5" y="12" width="6" height="1" fill="#606068"/>
  <!-- 底座 -->
  <rect x="4" y="13" width="8" height="1" fill="#202028"/>
</svg>
