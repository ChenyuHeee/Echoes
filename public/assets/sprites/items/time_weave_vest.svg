<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- 时编护甲 — 胸甲 -->
  <!-- 护肩 (左) -->
  <rect x="1"  y="2"  width="4" height="2" fill="#c07830"/>
  <rect x="1"  y="2"  width="4" height="1" fill="#d88840"/>
  <rect x="0"  y="3"  width="1" height="3" fill="#b06820"/>
  <!-- 护肩 (右) -->
  <rect x="11" y="2"  width="4" height="2" fill="#c07830"/>
  <rect x="11" y="2"  width="4" height="1" fill="#d88840"/>
  <rect x="15" y="3"  width="1" height="3" fill="#b06820"/>
  <!-- 胸甲主体 -->
  <rect x="3"  y="4"  width="10" height="8" fill="#c07830"/>
  <!-- 高光面 -->
  <rect x="3"  y="4"  width="10" height="1" fill="#e09040"/>
  <rect x="3"  y="4"  width="1"  height="8" fill="#d08030"/>
  <!-- 阴影面 -->
  <rect x="12" y="4"  width="1"  height="8" fill="#905820"/>
  <rect x="3"  y="11" width="10" height="1" fill="#905820"/>
  <!-- 中央纹路 -->
  <rect x="7"  y="5"  width="2" height="6" fill="#a06020"/>
  <rect x="5"  y="7"  width="6" height="2" fill="#a06020"/>
  <!-- 护甲纹路高光 -->
  <rect x="5"  y="5"  width="2" height="1" fill="#e09840"/>
  <rect x="9"  y="5"  width="2" height="1" fill="#e09840"/>
  <!-- 护腹 -->
  <rect x="4"  y="12" width="8" height="2" fill="#904810"/>
  <rect x="5"  y="12" width="6" height="1" fill="#a05820"/>
  <!-- 腰带 -->
  <rect x="3"  y="14" width="10" height="1" fill="#603010"/>
  <rect x="6"  y="14" width="4" height="1" fill="#804020"/>
</svg>
