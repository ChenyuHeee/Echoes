  <rect x="4" y="7" width="8" height="1" fill="#d0a040"/>
  <rect x="4" y="7" width="8" height="1" fill="#e0b850"/>
  <!-- 锚钩 -->
  <rect x="3" y="10" width="1" height="3" fill="#c08828"/>
  <rect x="12" y="10" width="1" height="3" fill="#c08828"/>
  <rect x="4" y="13" width="2" height="1" fill="#a87820"/>
  <rect x="10" y="13" width="2" height="1" fill="#a87820"/>
  <!-- 砂粒飘散 -->
  <rect x="2" y="5" width="1" height="1" fill="#f0d870"/>
  <rect x="13" y="6" width="1" height="1" fill="#f0d870"/>
  <rect x="14" y="11" width="1" height="1" fill="#e0c860"/>
