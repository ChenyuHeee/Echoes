  <rect x="7" y="2" width="2" height="2" fill="#e0a830"/>
  <rect x="6" y="3" width="1" height="1" fill="#c08820"/>
  <rect x="9" y="3" width="1" height="1" fill="#c08820"/>
  <!-- 锚柱 -->
  <rect x="7" y="4" width="2" height="6" fill="#d0a040"/>
  <rect x="7" y="4" width="1" height="6" fill="#f0c060"/>
