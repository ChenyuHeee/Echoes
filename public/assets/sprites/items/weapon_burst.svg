  <rect x="9" y="7" width="6" height="2" fill="#a05818"/>
  <rect x="9" y="10" width="6" height="2" fill="#a05818"/>
  <rect x="14" y="4" width="2" height="2" fill="#ffaa40"/>
  <rect x="14" y="7" width="2" height="2" fill="#ffaa40"/>
