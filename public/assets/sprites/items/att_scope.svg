<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- scope body (cylinder) -->
  <rect x="2" y="5" width="12" height="6" fill="#334466"/>
  <!-- lens (left eye) -->
  <rect x="1" y="5" width="3" height="6" fill="#223355"/>
  <rect x="1" y="6" width="2" height="4" fill="#2244aa"/>
  <rect x="2" y="7" width="1" height="2" fill="#88bbff"/>
  <!-- lens (right eye) -->
  <rect x="12" y="5" width="3" height="6" fill="#223355"/>
  <rect x="13" y="6" width="2" height="4" fill="#2244aa"/>
  <rect x="13" y="7" width="1" height="2" fill="#88bbff"/>
  <!-- crosshair in center -->
  <rect x="7" y="7" width="2" height="1" fill="#ffffff"/>
  <rect x="7" y="6" width="1" height="3" fill="#ffffff"/>
  <!-- mounting rail -->
  <rect x="5" y="10" width="6" height="2" fill="#556699"/>
</svg>
