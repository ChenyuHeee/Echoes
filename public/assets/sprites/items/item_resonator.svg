<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- 共鸣器 — 青色音叉 + 声波 -->
  <!-- 底座 -->
  <rect x="6" y="12" width="4" height="2" fill="#2a5868"/>
  <rect x="5" y="13" width="6" height="1" fill="#1a3848"/>
  <!-- 主柄 -->
  <rect x="7" y="9" width="2" height="3" fill="#3a7888"/>
  <!-- 双叉 -->
  <rect x="5" y="3" width="2" height="6" fill="#40a0c0"/>
  <rect x="9" y="3" width="2" height="6" fill="#40a0c0"/>
  <rect x="5" y="3" width="1" height="6" fill="#80d0e0"/>
  <rect x="9" y="3" width="1" height="6" fill="#80d0e0"/>
  <!-- 顶端高光 -->
  <rect x="5" y="2" width="2" height="1" fill="#a0e0f0"/>
  <rect x="9" y="2" width="2" height="1" fill="#a0e0f0"/>
  <!-- 声波涟漪 -->
  <rect x="2" y="5" width="1" height="1" fill="#80d0e0"/>
  <rect x="13" y="5" width="1" height="1" fill="#80d0e0"/>
  <rect x="1" y="7" width="1" height="1" fill="#60b0d0"/>
  <rect x="14" y="7" width="1" height="1" fill="#60b0d0"/>
  <rect x="3" y="9" width="1" height="1" fill="#80d0e0"/>
  <rect x="12" y="9" width="1" height="1" fill="#80d0e0"/>
</svg>
