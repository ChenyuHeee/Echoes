<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- 共鸣线圈 — 同心光环 -->
  <!-- 外环 (深青) -->
  <rect x="5"  y="1"  width="6" height="1" fill="#005580"/>
  <rect x="3"  y="2"  width="2" height="1" fill="#005580"/>
  <rect x="11" y="2"  width="2" height="1" fill="#005580"/>
  <rect x="2"  y="3"  width="1" height="1" fill="#005580"/>
  <rect x="13" y="3"  width="1" height="1" fill="#005580"/>
  <rect x="1"  y="4"  width="1" height="1" fill="#005580"/>
  <rect x="14" y="4"  width="1" height="1" fill="#005580"/>
  <rect x="1"  y="5"  width="1" height="6" fill="#005580"/>
  <rect x="14" y="5"  width="1" height="6" fill="#005580"/>
  <rect x="2"  y="11" width="1" height="1" fill="#005580"/>
  <rect x="13" y="11" width="1" height="1" fill="#005580"/>
  <rect x="3"  y="12" width="2" height="1" fill="#005580"/>
  <rect x="11" y="12" width="2" height="1" fill="#005580"/>
  <rect x="5"  y="13" width="6" height="1" fill="#005580"/>
  <!-- 中环 (亮青) -->
  <rect x="5"  y="3"  width="6" height="1" fill="#00aadd"/>
  <rect x="3"  y="4"  width="2" height="1" fill="#00aadd"/>
  <rect x="11" y="4"  width="2" height="1" fill="#00aadd"/>
  <rect x="3"  y="10" width="2" height="1" fill="#00aadd"/>
  <rect x="11" y="10" width="2" height="1" fill="#00aadd"/>
  <rect x="5"  y="11" width="6" height="1" fill="#00aadd"/>
  <rect x="3"  y="5"  width="1" height="5" fill="#00aadd"/>
  <rect x="12" y="5"  width="1" height="5" fill="#00aadd"/>
  <!-- 内芯 (最亮) -->
  <rect x="6"  y="5"  width="4" height="1" fill="#60eeff"/>
  <rect x="5"  y="6"  width="1" height="3" fill="#60eeff"/>
  <rect x="10" y="6"  width="1" height="3" fill="#60eeff"/>
  <rect x="6"  y="9"  width="4" height="1" fill="#60eeff"/>
  <!-- 核心能量 -->
  <rect x="6"  y="6"  width="4" height="3" fill="#b0f8ff"/>
  <rect x="7"  y="6"  width="2" height="3" fill="#e8ffff"/>
</svg>
