<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- double barrel (top) -->
  <rect x="6" y="3" width="9" height="2" fill="#cc8822"/>
  <rect x="14" y="3" width="2" height="2" fill="#ffcc44"/>
  <!-- double barrel (bottom) -->
  <rect x="6" y="6" width="9" height="2" fill="#cc8822"/>
  <rect x="14" y="6" width="2" height="2" fill="#ffcc44"/>
  <!-- body / receiver -->
  <rect x="3" y="3" width="4" height="6" fill="#aa6610"/>
  <!-- wood stock -->
  <rect x="0" y="4" width="4" height="5" fill="#8B4513"/>
  <rect x="1" y="5" width="2" height="3" fill="#a05a20"/>
  <!-- trigger -->
  <rect x="4" y="8" width="1" height="3" fill="#775500"/>
  <!-- grip wrap -->
  <rect x="3" y="8" width="2" height="4" fill="#664400"/>
  <!-- muzzle glow -->
  <rect x="15" y="3" width="1" height="1" fill="#ffffff"/>
  <rect x="15" y="6" width="1" height="1" fill="#ffffff"/>
</svg>
